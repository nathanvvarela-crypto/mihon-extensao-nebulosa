name: Build Extension

on:
  push:
    branches:
      - main
      - principal

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          if [ -f gradlew ]; then chmod +x gradlew; fi
          ./gradlew assembleDebug || echo "Falha na compilação, mas vamos verificar os logs"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nebulosa-extension
          path: "**/*.apk"
